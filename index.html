<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Wichtig: Titel anpassen (Der Titel wird im Browser-Tab angezeigt) -->
    <title>Die Streuselschnecke</title>

   <link rel="stylesheet" href="styles.css"> 

    <!-- Wichtig: Favicon anpassen (Das Favicon wird im Browser-Tab angezeigt) -->
    <link rel="icon" type="image/x-con" href="img/Browser-Tab.png">
  </head>
  <body>
    <!-- In dieser Überschrift (mit Behälter id="header") wird kein Inhalt durch JavaScript angepasst-->
    <div id="header" class="container">
      <h1 id="main-title">
        Die Streusel-
        <br>
        schnecke</h1>
    </div>

    <div id="start-container" class="container">
      <div id="start-button-holder">
        <button id="start-button">Start</button>
      </div>
    </div>


    <div id="story-wrapper">
      <div id="image-container" style="display: none;">
        <img id="story-image" src="" alt="">
      </div>

      <div id="story-container" class="container" style="display: none;">
        <div id="text-container"></div>
        <div id="decision-container">
          <div id="buttons-and-inputs"></div>
          <div id="timer-container"></div>
        </div>
        <div id="name"></div>
      </div>
    </div>

    <script src="script.js"></script> 
    
    <img id="SchneckeTitelbild" src="img/Schnecke.Titelbild.svg" alt="">

    <div id="bottomRectangle"></div>

  </body>

</html>
